[package]
name = "qubit-batch"
version = "0.3.1"
edition = "2024"
rust-version = "1.94"
authors = ["Haixing Hu <starfish.hu@gmail.com>"]
license = "Apache-2.0"
repository = "https://github.com/qubit-ltd/rs-batch"
description = "Batch task execution abstractions and sequential executor with progress reporting"
homepage = "https://github.com/qubit-ltd/rs-batch"
documentation = "https://docs.rs/qubit-batch"
readme = "README.md"
keywords = ["batch", "progress", "executor", "sequential"]
categories = ["concurrency", "development-tools"]
exclude = [
    "coverage.sh",
    "check-coverage-thresholds.sh",
    ".circleci/*",
    "align-ci.sh",
    "ci-check.sh",
]

[lib]
name = "qubit_batch"
doctest = true

[dependencies]
log = "0.4"
thiserror = "2.0"

qubit-function = "0.11"
qubit-progress = "0.1"
